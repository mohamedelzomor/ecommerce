<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Admin</title>
    <link rel="stylesheet" th:href="@{/Admin/AddAdmin.css}">
</head>
<body>
<div class="container">
    <h2>Add New Admin</h2>

    <!-- ✅ لازم نحط th:object هنا -->
    <form th:action="@{/AdminAuth/AddAdmin}" th:object="${admin}" method="post">

        <div class="input-group">
            <label for="Name">Name:</label>
            <input type="text" th:field="*{name}" id="Name" required>
        </div>

        <div class="input-group">
            <label for="email">Email:</label>
            <input type="email" th:field="*{email}" id="email" required>
        </div>

        <div class="input-group">
            <label for="password">Password:</label>
            <input type="password" th:field="*{password}" id="password" required>
        </div>

        <div class="input-group">
            <label for="phoneNumber">Phone Number:</label>
            <input type="text" th:field="*{phoneNumber}" id="phoneNumber" required>
        </div>

        <button type="submit">Add Admin</button>
    </form>

    <!-- Error Message -->
    <div th:if="${error}" class="error-msg" th:text="${error}"></div>

    <!-- 🔙 Back Button -->
    <div class="back-container">
        <a th:href="@{/AdminDashboard}" class="back-btn">⬅️ Back</a>
    </div>
</div>
</body>
</html>

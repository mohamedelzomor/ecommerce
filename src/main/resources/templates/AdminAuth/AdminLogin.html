<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" th:href="@{/Admin/AdminLogin.css}">
</head>
<body>
  <div class="center-screen">
    <form th:action="@{/AdminAuth/AdminLogin}" th:object="${admin}" method="post" class="login-form">
      <h2>Admin Login</h2>

      <label for="email">Email:</label>
      <input type="email" th:field="*{email}" id="email" placeholder="Enter your email" required>

      <label for="password">Password:</label>
      <input type="password" th:field="*{password}" id="password" placeholder="Enter your password" required>

      <div class="btn-group">
        <button type="submit" class="login-btn">Login</button>
        <a th:href="@{/AdminAuth/AdminRegister}">
          <button type="button" class="register-btn">Register</button>
        </a>
      </div>

      <!-- رسائل الخطأ أو النجاح -->
      <p th:if="${error}" th:text="${error}" class="error-msg"></p>
      <p th:if="${success}" th:text="${success}" class="success-msg"></p>
    </form>
  </div>

  <!-- optional: include JS -->
  <!-- <script th:src="@{/Admin/AdminLogin.js}"></script> -->
</body>
</html>

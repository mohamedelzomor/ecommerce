<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Page</title>
  <link rel="stylesheet" th:href="@{/User/Register.css}" />
</head>
<body>

<div class="center-screen">
  <form th:action="@{/Auth/RegisterPage}" method="post" th:object="${user}" class="login-form">
    <h2>Register</h2>

    <p th:if="${error}" th:text="${error}" class="error-msg"></p>
    <p th:if="${success}" th:text="${success}" class="success-msg"></p>

    <label for="firstName">First Name:</label>
    <input type="text" id="firstName" name="firstName" placeholder="Enter your first name" required>

    <label for="lastName">Last Name:</label>
    <input type="text" id="lastName" name="lastName" placeholder="Enter your last name" required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required 
           pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$">

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" placeholder="Enter your password" required>

    <label for="phoneNumber">Phone Number:</label>
    <input type="text" id="phoneNumber" name="phoneNumber" placeholder="Enter your phone number" 
           pattern="[0-9]{10,15}">

    <label for="city">City:</label>
    <input type="text" id="city" name="city" placeholder="Enter your city">

    <label for="address">Address:</label>
    <input type="text" id="address" name="address" placeholder="Enter your address">

    <button type="submit" class="register-btn">Register</button>

    <div class="btn-group">
      <a th:href="@{/Auth/LoginPage}" class="login-btn">Login</a>
      <a th:href="@{/Home}" class="home-btn2">Home</a>
    </div>
  </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <link rel="stylesheet" th:href="@{/User/Login.css}" />
</head>
<body>

<div class="center-screen">
  <form id="loginForm" class="login-form" method="post" th:action="@{/Auth/LoginPage}">
    <h2>🔐 Login</h2>

    <p th:if="${error}" th:text="${error}" class="error-msg"></p>
    <p th:if="${success}" th:text="${success}" class="success-msg"></p>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" placeholder="Enter your password" required>

    <button type="submit" class="btn primary">Login</button>

    <div class="btn-group">
      <a th:href="@{/Auth/RegisterPage}" class="btn secondary">Register</a>
      <a th:href="@{/Home}" class="btn secondary">Home</a>
    </div>
  </form>
</div>

</body>
</html>

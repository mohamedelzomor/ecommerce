<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
        <link rel="stylesheet" th:href="@{/Admin/Users.css}">

</head>
<body>

<h2>Edit User</h2>

<form th:action="@{/UpdateUser}" th:object="${user}" method="post">
    <input type="hidden" th:field="*{id}" />

    <label>First Name:</label>
    <input type="text" th:field="*{firstName}" required><br>

    <label>Last Name:</label>
    <input type="text" th:field="*{lastName}" required><br>

    <label>Email:</label>
    <input type="email" th:field="*{email}" required><br>

    <label>Password:</label>
    <input type="password" th:field="*{password}" required><br>

    <label>Phone Number:</label>
    <input type="text" th:field="*{phoneNumber}" required><br>

    <label>City:</label>
    <input type="text" th:field="*{city}" required><br>

    <label>Address:</label>
    <input type="text" th:field="*{address}" required><br>

    <button type="submit">Update</button>
</form>

<a th:href="@{/UserDetails}">⬅ Back</a>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Product</title>
  <link rel="stylesheet" th:href="@{/Admin/EditProduct.css}">
</head>
<body>

  <div class="form-container">
    <h2>Edit Product</h2>

    <form th:action="@{/AdminProducts/update}"
          th:object="${product}"
          method="post"
          enctype="multipart/form-data">

      <!-- Hidden ID -->
      <input type="hidden" th:field="*{id}">

      <!--  Title -->
      <label for="title">Title:</label>
      <input type="text" id="title" th:field="*{title}" required>

      <!--  Category  -->
      <label for="categoryId">Category:</label>
      <select th:field="*{categoryId}" id="categoryId">
        <option value="">-- Select Category --</option>
        <option th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.title}"
                th:selected="${cat.id == product.categoryId}">
        </option>
      </select>

      <!--  Description -->
      <label for="description">Description:</label>
      <textarea id="description" th:field="*{description}" required></textarea>

      <!--  Price -->
      <label for="price">Price:</label>
      <input type="number" id="price" th:field="*{price}" step="0.01" required>

      <!--  Quantity -->
      <label for="quantity">Quantity:</label>
      <input type="number" id="quantity" th:field="*{quantity}" required>

      <!--  Image  -->
      <label for="image">Product Image:</label>
      <input type="file" id="image" name="image" accept="image/*">

      <!-- buttons -->
      <div class="btn-group">
        <button type="submit" class="edit">Update</button>
        <a th:href="@{/AdminProducts}" class="cancel">Cancel</a>
      </div>

    </form>
  </div>

</body>
</html>

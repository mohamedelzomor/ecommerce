<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users Details Page</title>
    <link rel="stylesheet" th:href="@{/Admin/Users.css}">
</head>
<body>

<!-- زرار Back -->
<div class="back-container">
  <a th:href="@{/AdminDashboard}" class="back-btn">⬅️ Back</a>
</div>
 
<h2>Users List</h2>

<table>
    <tr> 
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Password</th>
        <th>Phone Number</th>
        <th>City</th>
        <th>Address</th>
        <th>Actions</th>
    </tr>
    
    <tr th:each="user : ${userList}">
        <td th:text="${user.firstName}"></td>
        <td th:text="${user.lastName}"></td>
        <td th:text="${user.email}"></td>
        <td th:text="${user.password}"></td>
        <td th:text="${user.phoneNumber}"></td>
        <td th:text="${user.city}"></td>
        <td th:text="${user.address}"></td>
        <td>
           <a th:href="@{/EditUser(id=${user.id})}" class="button edit">✏️ Edit</a> |
           <a th:href="@{/deleteUser(id=${user.id})}"
              onclick="return confirm('Are you sure you want to delete this user?');"
              class="button delete">🗑️ Delete</a>
        </td>
    </tr>
</table> 

<h2>Add New User</h2>

<form method="post" th:action="@{/addUser}" th:object="${user}">
    <label for="firstName">First Name:</label>
    <input type="text" th:field="*{firstName}" placeholder="Enter first name" required>

    <label for="lastName">Last Name:</label>
    <input type="text" th:field="*{lastName}" placeholder="Enter last name" required>

    <label for="email">Email:</label>
    <input type="email" th:field="*{email}" placeholder="Enter email" required>

    <label for="password">Password:</label>
    <input type="password" th:field="*{password}" placeholder="Enter password" required>

    <label for="phoneNumber">Phone Number:</label>
    <input type="text" th:field="*{phoneNumber}" placeholder="Enter phone number" required>

    <label for="city">City:</label>
    <input type="text" th:field="*{city}" placeholder="Enter city" required>

    <label for="address">Address:</label>
    <input type="text" th:field="*{address}" placeholder="Enter address" required>

    <input type="submit" value="Add User">
</form>

</body>
</html>
